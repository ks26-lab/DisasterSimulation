<!DOCTYPE html>
<html>

<head>

   

    <title>Disaster Simulation</title>

    <style>
html,
body,
#cesiumContainer {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}
#controlPanel {
    position: absolute;
    top: 15px;
    left: 15px;

    width: 280px;

    background: rgba(255,255,255,0.95);

    padding: 15px;

    border-radius: 12px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);

    z-index: 1000;
}

#dashboard {
    position: absolute;

    top: 15px;
    right: 15px;

    width: 300px;

    background: rgba(255,255,255,0.95);

    padding: 15px;

    border-radius: 12px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);

    z-index: 1000;
}

#eventLogDisplay {

    max-height: 150px;

    overflow-y: auto;

    border: 1px solid #ccc;

    padding: 8px;

    font-size: 12px;

    background: #f7f7f7;
}

#geminiObservation {

    margin-top: 10px;

    padding: 10px;

    border: 1px solid #ccc;

    background: #f8f8f8;

    max-height: 200px;

    overflow-y: auto;
}

#agentPanel {


    position: absolute;

    bottom: 15px;

    right: 15px;

    width: 320px;

    background: rgba(255,255,255,0.95);

    padding: 15px;

    border-radius: 12px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);

    z-index: 1000;
}

h3 {
    margin-top: 0;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    cursor: pointer;
}

.status-low {
    color: green;
}

.status-medium {
    color: orange;
}

.status-high {
    color: red;
}

.status-critical {
    color: darkred;
    font-weight: bold;
}


</style>
</head>

<body>
     <div id="dashboard">

    <h3>Disaster Dashboard</h3>

    <p>
        Water Level:
        <span id="waterDisplay">0</span>
    </p>

    <p>
        Risk Level:
        <span id="riskDisplay">LOW</span>
    </p>

    <p>
        Population:
        <span id="populationDisplay">0</span>
    </p>

    <p>
        Recommendation:
        <span id="recommendationDisplay">
            None
        </span>
    </p>

    <p>
        Recovery:
        <span id="recoveryDisplay">
            No
        </span>
    </p>
    <p>
    Simulation Time:
    <span id="timeDisplay">
        --
    </span>
</p>

</div>

<div id="agentPanel">

    <h3>Observation Agent</h3>

    <p>
        Trend:
        <span id="trendDisplay">
            STABLE
        </span>
    </p>

    <p>
        Latest Event:
        <span id="eventDisplay">
            None
        </span>
    </p>

    <p>
        Agent Summary:
        <span id="summaryDisplay">
            Waiting...
        </span>
    </p>
    <h4>Event Log</h4>

    <h4>AI Observation</h4>

<div id="geminiObservation">
    Waiting for observation...
</div>

<div id="eventLogDisplay">
    No events yet
</div>
</div>

    <div id="controlPanel">

        <h3>Flood Controls</h3>

        <label>
            Rainfall (mm/hr)
        </label>

        <input
            type="number"
            id="rainfall"
            value="50"
        >

        <label>
            River Flow
        </label>

        <input
            type="number"
            id="riverFlow"
            value="20"
        >

        <label>
            Drainage Capacity
        </label>

        <input
            type="number"
            id="drainage"
            value="10"
        >

        <br><br>

        <button id="startBtn">
            Start Simulation
        </button>
        <button id="pauseBtn">
        Pause Simulation
        </button>
        <button id="resetBtn">
    Reset Simulation
</button>


    </div>

    <div id="cesiumContainer"></div>

    <script
        type="module"
        src="/src/main.js">
    </script>

</body>

</html>
